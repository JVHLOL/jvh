<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Profile</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Share Tech Mono', monospace;
}
body {
  height: 100vh;
  overflow: auto;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  position: relative;
}
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: url("https://media1.giphy.com/media/v1.Y2lkPTc5MGI3NjExMTB3cTBnYWR1NGN2cjd6ODduZThjNmI2a3VxMW50dnZhbGhiN3o4YyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/tZKET59fOmmDzzHMjY/giphy.gif") center/cover no-repeat;
  z-index: -2;
}
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: -1;
}
.container {
  max-width: 900px;
  padding: 30px;
  border-radius: 20px;
  background: rgba(255,255,255,0.08);
  box-shadow: 0 0 30px rgba(255,255,255,0.15);
  backdrop-filter: blur(10px);
}
h1 { font-size: 3rem; margin-bottom: 20px; }

#typed-text {
  font-size: 1.2rem;
  min-height: 200px;
  white-space: pre-line;
}

/* LINKS */
.links {
  margin-top: 20px;
  display: flex;
  justify-content: center;
  gap: 40px;
}
.links img {
  width: 70px;
  transition: 0.3s;
}
.links img:hover { transform: scale(1.15); }

/* MUSIC PLAYER */
.music-player {
  margin-top: 30px;
  background: rgba(20, 20, 35, 0.9);
  border-radius: 12px;
  padding: 14px 18px;
  box-shadow: 0 8px 25px rgba(0,0,0,0.5);
  border: 1px solid rgba(255,255,255,0.1);
}

#song-info {
  font-size: 1.05rem;
  margin-bottom: 10px;
  color: #fff;
  text-align: center;
}

.player-main {
  display: flex;
  align-items: center;
  gap: 12px;
}

.progress-container {
  flex: 1;
  margin: 0 12px;
}

.progress-bar {
  height: 4px;
  background: rgba(255,255,255,0.2);
  border-radius: 999px;
  overflow: hidden;
  position: relative;
}
.progress {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #a855f7, #c026d3, #db2777);
  transition: width 0.3s linear;
}

.time {
  display: flex;
  justify-content: space-between;
  font-size: 0.85rem;
  margin-top: 4px;
  color: #bbb;
}

.controls {
  display: flex;
  align-items: center;
  gap: 8px;
}
.controls button {
  background: none;
  border: none;
  color: white;
  font-size: 24px;
  cursor: pointer;
  padding: 6px 8px;
  border-radius: 50%;
  transition: 0.2s;
  line-height: 1;
}
.controls button:hover {
  background: rgba(255,255,255,0.15);
  transform: scale(1.15);
}
</style>
</head>
<body>
<div class="overlay"></div>
<div class="container">
<h1>About Me</h1>
<div id="typed-text"></div>

<!-- LINKS -->
<div class="links">
  <a href="https://www.roblox.com/users/3442848028/profile" target="_blank">
    <img src="https://upload.wikimedia.org/wikipedia/commons/7/7e/Roblox_Logo_2022.jpg">
  </a>
  <a href="https://discord.com" target="_blank">
    <img src="https://cdn-icons-png.flaticon.com/512/5968/5968756.png">
  </a>
</div>

<!-- MUSIC PLAYER -->
<div class="music-player">
  <div id="song-info">Press play to start</div>
  
  <div class="player-main">
    <div class="controls">
      <button onclick="prev()">❮❮</button>
      <button onclick="toggle()" id="play">▶</button>
      <button onclick="next()">❯❯</button>
    </div>

    <div class="progress-container">
      <div class="progress-bar">
        <div class="progress" id="progress"></div>
      </div>
      <div class="time">
        <span id="current-time">0:00</span>
        <span id="duration">4:20</span>
      </div>
    </div>
  </div>

  <iframe id="frame" style="display:none; width:100%; height:0; border:none;" allow="autoplay" frameborder="0"></iframe>
</div>
</div>

<script>
/* Typing Effect */
const text = `I love dogs and cars. My favorite colors are blue, red, black, green and more.
I play Roblox, Brawl Stars, Clash Royale and more.
Big fan of Flamingo and iShowSpeed 🔥`;

let i = 0;
function type() {
  if (i < text.length) {
    document.getElementById("typed-text").innerHTML += text[i++];
    setTimeout(type, 30);
  }
}
type();

/* Music Player */
const songs = [
  { url: "https://open.spotify.com/embed/track/6xV7Be6XEvkSnighmh2Tzj", name: "Sugar on my tongue - Tyler, The Creator" },
  { url: "https://open.spotify.com/embed/track/7KA4W4McWYRpgf0fWsJZWB", name: "See You Again - Tyler, The Creator" },
  { url: "https://open.spotify.com/embed/track/5pz158yrIuE2EmhafSlZDf", name: "Pass Out" },
  { url: "https://open.spotify.com/embed/track/1f5cbQtDrykjarZVrShaDI", name: "Drowning" },
  { url: "https://open.spotify.com/embed/track/5sIcVo0Tv1kDGEqmtbRoqq", name: "Nuts" }
];

let index = 0;
let playing = false;

const frame = document.getElementById("frame");
const playBtn = document.getElementById("play");
const info = document.getElementById("song-info");
const progress = document.getElementById("progress");
const currentTimeEl = document.getElementById("current-time");

function loadSong() {
  frame.src = songs[index].url + "?autoplay=1&theme=0";
  info.innerText = songs[index].name;
}

function toggle() {
  playing = !playing;
  if (playing) {
    loadSong();
    playBtn.innerText = "❚❚";
    startProgress();
  } else {
    frame.src = "";
    playBtn.innerText = "▶";
    clearInterval(progressInterval);
  }
}

function next() {
  index = (index + 1) % songs.length;
  if (playing) loadSong();
  else info.innerText = songs[index].name;
}

function prev() {
  index = (index - 1 + songs.length) % songs.length;
  if (playing) loadSong();
  else info.innerText = songs[index].name;
}

/* Fake Progress */
let progressInterval;
function startProgress() {
  clearInterval(progressInterval);
  let percent = 0;
  progressInterval = setInterval(() => {
    if (!playing) return;
    percent += 1.8;
    if (percent >= 100) percent = 0;
    
    progress.style.width = percent + "%";
    
    let currentSec = Math.floor((percent / 100) * 260);
    let min = Math.floor(currentSec / 60);
    let sec = currentSec % 60;
    currentTimeEl.textContent = `${min}:${sec.toString().padStart(2, '0')}`;
  }, 120);
}
</script>
</body>
</html>
