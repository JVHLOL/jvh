<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Profile</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Share Tech Mono', monospace;
}
body {
  height: 100vh;
  overflow: auto;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  text-align: center;
  position: relative;
}
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: url("https://media1.giphy.com/media/v1.Y2lkPTc5MGI3NjExMTB3cTBnYWR1NGN2cjd6ODduZThjNmI2a3VxMW50dnZhbGhiN3o4YyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/tZKET59fOmmDzzHMjY/giphy.gif") center/cover no-repeat;
  z-index: -2;
}
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.55);
  z-index: -1;
}
.container {
  max-width: 900px;
  padding: 30px;
  border-radius: 20px;
  background: rgba(255,255,255,0.08);
  box-shadow: 0 0 30px rgba(255,255,255,0.15);
  backdrop-filter: blur(10px);
}
h1 { font-size: 3rem; margin-bottom: 20px; }

#typed-text {
  font-size: 1.2rem;
  min-height: 200px;
  white-space: pre-line;
  border-right: 3px solid white;
}

/* LINKS */
.links {
  margin-top: 20px;
  display: flex;
  justify-content: center;
  gap: 40px;
}
.links img {
  width: 70px;
  transition: 0.3s;
  filter: drop-shadow(0 0 10px white);
}
.links img:hover { transform: scale(1.15); }

/* MUSIC PLAYER */
.music-player {
  margin-top: 25px;
  padding: 20px;
  border-radius: 15px;
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(8px);
}

#song-info {
  font-size: 1.1rem;
  margin-bottom: 12px;
  min-height: 28px;
}

.controls {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 25px;
  margin: 15px 0;
}

.controls button {
  background: rgba(0, 0, 0, 0.6);
  color: white;
  border: 2px solid rgba(255,255,255,0.3);
  width: 55px;
  height: 55px;
  border-radius: 50%;
  font-size: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.3s;
  box-shadow: 0 4px 15px rgba(0,0,0,0.4),
              inset 0 2px 4px rgba(255,255,255,0.3),
              inset 0 -2px 4px rgba(0,0,0,0.4);
}

.controls button:hover {
  transform: scale(1.1);
  background: rgba(0, 0, 0, 0.8);
  border-color: white;
}

#play {
  width: 65px;
  height: 65px;
  font-size: 28px;
}

/* Progress Bar */
.progress-bar {
  width: 100%;
  height: 8px;
  background: rgba(255,255,255,0.15);
  border-radius: 10px;
  overflow: hidden;
  margin: 15px 0;
}
.progress {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #ff0000, #ff7f00, #ffff00, #00ff00, #00ffff, #0000ff, #8b00ff);
  transition: width 0.3s linear;
  animation: rainbow 4s linear infinite;
}

@keyframes rainbow {
  0%   { filter: hue-rotate(0deg); }
  100% { filter: hue-rotate(360deg); }
}

/* Volume */
.volume {
  display: flex;
  align-items: center;
  gap: 10px;
  justify-content: center;
}
.volume button {
  background: none;
  border: none;
  font-size: 24px;
  cursor: pointer;
  padding: 5px;
}
</style>
</head>
<body>
<div class="overlay"></div>
<div class="container">
<h1>About Me</h1>
<div id="typed-text"></div>

<!-- LINKS -->
<div class="links">
  <a href="https://www.roblox.com/users/3442848028/profile" target="_blank">
    <img src="https://upload.wikimedia.org/wikipedia/commons/7/7e/Roblox_Logo_2022.jpg">
  </a>
  <a href="https://discord.com" target="_blank">
    <img src="https://cdn-icons-png.flaticon.com/512/5968/5968756.png">
  </a>
</div>

<!-- MUSIC PLAYER -->
<div class="music-player">
  <div id="song-info">Press play to start</div>
  
  <div class="controls">
    <button onclick="prev()">⏮</button>
    <button onclick="toggle()" id="play">▶</button>
    <button onclick="next()">⏭</button>
  </div>

  <div class="progress-bar">
    <div class="progress" id="progress"></div>
  </div>

  <div class="volume">
    <button onclick="toggleMute()">🔊</button>
    <input type="range" min="0" max="1" step="0.01" value="1" id="vol">
  </div>

  <iframe id="frame" style="display:none; width:100%; height:80px; border:none;" allow="autoplay"></iframe>
</div>
</div>

<script>
/* Typing Effect */
const text = `I love dogs and cars. My favorite colors are blue, red, black, green and more.
I play Roblox, Brawl Stars, Clash Royale and more.
Big fan of Flamingo and iShowSpeed 🔥`;

let i = 0;
function type() {
  if (i < text.length) {
    document.getElementById("typed-text").innerHTML += text[i++];
    setTimeout(type, 30);
  }
}
type();

/* Music Player */
const songs = [
  { url: "https://open.spotify.com/embed/track/5pz158yrIuE2EmhafSlZDf", name: "Industry Baby" },
  { url: "https://open.spotify.com/embed/track/1f5cbQtDrykjarZVrShaDI", name: "Kiss Me More" },
  { url: "https://open.spotify.com/embed/track/5sIcVo0Tv1kDGEqmtbRoqq", name: "Levitating" },
  { url: "https://open.spotify.com/embed/track/7KA4W4McWYRpgf0fWsJZWB", name: "Stay" },
  { url: "https://open.spotify.com/embed/track/6xV7Be6XEvkSnighmh2Tzj", name: "Peaches" }
];

let index = 0;
let playing = false;
let muted = false;

const frame = document.getElementById("frame");
const playBtn = document.getElementById("play");
const info = document.getElementById("song-info");
const progress = document.getElementById("progress");
const volSlider = document.getElementById("vol");

function loadSong() {
  frame.src = songs[index].url + "?autoplay=1";
  info.innerText = songs[index].name;
}

function toggle() {
  playing = !playing;
  if (playing) {
    loadSong();
    playBtn.innerText = "⏸";
    progress.style.animationPlayState = "running";
  } else {
    frame.src = "";
    playBtn.innerText = "▶";
    progress.style.animationPlayState = "paused";
  }
}

function next() {
  index = (index + 1) % songs.length;
  if (playing) loadSong();
  else info.innerText = songs[index].name;
}

function prev() {
  index = (index - 1 + songs.length) % songs.length;
  if (playing) loadSong();
  else info.innerText = songs[index].name;
}

function toggleMute() {
  muted = !muted;
  frame.style.opacity = muted ? "0.3" : "1";
  volSlider.value = muted ? 0 : 1;
}

// Volume Control
volSlider.addEventListener("input", (e) => {
  frame.style.opacity = e.target.value;
  if (parseFloat(e.target.value) === 0) muted = true;
  else muted = false;
});

// Auto update progress bar animation when playing
setInterval(() => {
  if (playing) {
    progress.style.width = "100%";
  }
}, 1000);

</script>
</body>
</html>
