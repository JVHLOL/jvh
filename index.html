<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ㅤ</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet" />

<style>

  margin: 0;
  padding: 0;

}

/* 3D pixel pointing hand for clickable things */
a, button, .links a {
  cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='32' height='32' viewBox='0 0 16 16' shape-rendering='crispEdges'><rect x='6' y='1' width='1' height='1' fill='%23000'/><rect x='7' y='1' width='1' height='1' fill='%23fff'/><rect x='8' y='1' width='1' height='1' fill='%23000'/><rect x='6' y='2' width='1' height='1' fill='%23000'/><rect x='7' y='2' width='1' height='1' fill='%23fff'/><rect x='8' y='2' width='1' height='1' fill='%23000'/><rect x='6' y='3' width='1' height='1' fill='%23000'/><rect x='7' y='3' width='1' height='1' fill='%23fff'/><rect x='8' y='3' width='1' height='1' fill='%23000'/><rect x='6' y='4' width='1' height='1' fill='%23000'/><rect x='7' y='4' width='1' height='1' fill='%23fff'/><rect x='8' y='4' width='1' height='1' fill='%23000'/><rect x='4' y='5' width='1' height='1' fill='%23000'/><rect x='5' y='5' width='1' height='1' fill='%23fff'/><rect x='6' y='5' width='1' height='1' fill='%23000'/><rect x='7' y='5' width='1' height='1' fill='%23fff'/><rect x='8' y='5' width='1' height='1' fill='%23000'/><rect x='9' y='5' width='1' height='1' fill='%23fff'/><rect x='10' y='5' width='1' height='1' fill='%23000'/><rect x='3' y='6' width='1' height='1' fill='%23000'/><rect x='4' y='6' width='1' height='1' fill='%23fff'/><rect x='5' y='6' width='1' height='1' fill='%23000'/><rect x='6' y='6' width='1' height='1' fill='%23fff'/><rect x='7' y='6' width='1' height='1' fill='%23fff'/><rect x='8' y='6' width='1' height='1' fill='%23fff'/><rect x='9' y='6' width='1' height='1' fill='%23000'/><rect x='10' y='6' width='1' height='1' fill='%23fff'/><rect x='11' y='6' width='1' height='1' fill='%23000'/><rect x='3' y='7' width='1' height='1' fill='%23000'/><rect x='4' y='7' width='1' height='1' fill='%23fff'/><rect x='5' y='7' width='6' height='1' fill='%23fff'/><rect x='11' y='7' width='1' height='1' fill='%23000'/><rect x='3' y='8' width='1' height='1' fill='%23000'/><rect x='4' y='8' width='7' height='1' fill='%23fff'/><rect x='11' y='8' width='1' height='1' fill='%231e90ff'/><rect x='12' y='8' width='1' height='1' fill='%23000'/><rect x='4' y='9' width='1' height='1' fill='%23000'/><rect x='5' y='9' width='6' height='1' fill='%23fff'/><rect x='11' y='9' width='1' height='1' fill='%231e90ff'/><rect x='12' y='9' width='1' height='1' fill='%23000'/><rect x='4' y='10' width='1' height='1' fill='%23000'/><rect x='5' y='10' width='6' height='1' fill='%23fff'/><rect x='11' y='10' width='1' height='1' fill='%231e90ff'/><rect x='12' y='10' width='1' height='1' fill='%23000'/><rect x='4' y='11' width='1' height='1' fill='%23000'/><rect x='5' y='11' width='6' height='1' fill='%23fff'/><rect x='11' y='11' width='1' height='1' fill='%23000'/><rect x='5' y='12' width='1' height='1' fill='%23000'/><rect x='6' y='12' width='5' height='1' fill='%23fff'/><rect x='11' y='12' width='1' height='1' fill='%23000'/><rect x='5' y='13' width='6' height='1' fill='%23000'/></svg>") 8 2, pointer;
}

body {
  height: 100vh;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  position: relative;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: url("https://media1.giphy.com/media/v1.Y2lkPTc5MGI3NjExMTB3cTBnYWR1NGN2cjd6ODduZThjNmI2a3VxMW50dnZhbGhiN3o4YyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/tZKET59fOmmDzzHMjY/giphy.gif")
    center/cover no-repeat;
  filter: brightness(0.35);
  z-index: -3;
}

body::after {
  content: "";
  position: fixed;
  inset: 0;
  padding: 6px;
  pointer-events: none;

  background: linear-gradient(
    45deg,
    rgba(255, 0, 0, 0.5),
    rgba(255, 165, 0, 0.5),
    rgba(255, 255, 0, 0.5),
    rgba(0, 255, 0, 0.5),
    rgba(0, 255, 255, 0.5),
    rgba(0, 0, 255, 0.5),
    rgba(238, 130, 238, 0.5),
    rgba(255, 0, 0, 0.5)
  );

  background-size: 300% 300%;
  animation: rainbow 8s linear infinite;

  -webkit-mask:
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
}

@keyframes rainbow {
  0% { background-position: 0% 50%; }
  100% { background-position: 300% 50%; }
}

.container {
  max-width: 900px;
  padding: 30px;
  border-radius: 20px;
  text-align: center;
  background: rgba(255, 255, 255, 0.08);
  backdrop-filter: blur(12px);
  z-index: 2;
  position: relative;
}

h1 { font-size: 3rem; }

.birthday {
  margin-top: 8px;
  font-size: 1.2rem;
  opacity: 0.85;
}

#typed-text {
  font-size: 1.1rem;
  min-height: 150px;
  white-space: pre-line;
}

.neon {
  font-size: 1.7rem;
  margin-top: 20px;
  color: #fff;
  text-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 20px #fff;
}

.links {
  margin-top: 20px;
  display: flex;
  justify-content: center;
  gap: 40px;
}

.links a {
  display: inline-block;
  padding: 12px;
  border-radius: 18px;
  background: rgba(255, 255, 255, 0.08);
  backdrop-filter: blur(10px);
  transition: 0.3s;
}

.links a:hover {
  transform: scale(1.1);
  background: rgba(255, 255, 255, 0.15);
}

.links img { width: 65px; }

.music-player {
  margin-top: 20px;
  background: rgba(20, 20, 35, 0.92);
  border-radius: 12px;
  padding: 16px;
}

iframe {
  width: 100%;
  height: 152px;
  border-radius: 8px;
}

.wolf {
  position: fixed;
  width: 38px;
  height: 38px;
  pointer-events: none;
  transform: translate(-50%, -50%);
  animation: pop 0.15s ease-out;
  z-index: 9999;
}

@keyframes pop {
  from { transform: translate(-50%, -50%) scale(0.2); }
  to { transform: translate(-50%, -50%) scale(1); }
}
</style>
</head>
<body>
  <div class="container">
    <h1>About Me</h1>
    <p class="birthday">Birthday: 2/21/2012</p>

    <div id="typed-text"></div>

    <p class="neon">Songs I Like</p>

    <div class="links">
      <a href="#"><img src="" alt="link 1" /></a>
      <a href="#"><img src="" alt="link 2" /></a>
    </div>

    <div class="music-player">
      <iframe src="" title="music"></iframe>
    </div>
  </div>
</body>
</html>
