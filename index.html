<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ㅤ</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet" />

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Share Tech Mono', monospace;

  cursor: url("https://cdn.custom-cursor.com/packs/2122/pack2747.png") 6 6, auto;
}

body {
  height: 100vh;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  position: relative;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: url("https://media1.giphy.com/media/v1.Y2lkPTc5MGI3NjExMTB3cTBnYWR1NGN2cjd6ODduZThjNmI2a3VxMW50dnZhbGhiN3o4YyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/tZKET59fOmmDzzHMjY/giphy.gif")
    center/cover no-repeat;
  filter: brightness(0.35);
  z-index: -3;
}

body::after {
  content: "";
  position: fixed;
  inset: 0;
  padding: 6px;
  pointer-events: none;

  background: linear-gradient(
    45deg,
    rgba(255, 0, 0, 0.5),
    rgba(255, 165, 0, 0.5),
    rgba(255, 255, 0, 0.5),
    rgba(0, 255, 0, 0.5),
    rgba(0, 255, 255, 0.5),
    rgba(0, 0, 255, 0.5),
    rgba(238, 130, 238, 0.5),
    rgba(255, 0, 0, 0.5)
  );

  background-size: 300% 300%;
  animation: rainbow 8s linear infinite;

  -webkit-mask:
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
}

@keyframes rainbow {
  0% { background-position: 0% 50%; }
  100% { background-position: 300% 50%; }
}

.container {
  max-width: 900px;
  padding: 30px;
  border-radius: 20px;
  text-align: center;
  background: rgba(255, 255, 255, 0.08);
  backdrop-filter: blur(12px);
  z-index: 2;
  position: relative;
}

h1 {
  font-size: 3rem;
}

.birthday {
  margin-top: 8px;
  font-size: 1.2rem;
  opacity: 0.85;
}

#typed-text {
  font-size: 1.1rem;
  min-height: 150px;
  white-space: pre-line;
}

.neon {
  font-size: 1.7rem;
  margin-top: 20px;
  color: #fff;
  text-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 20px #fff;
}

.links {
  margin-top: 20px;
  display: flex;
  justify-content: center;
  gap: 40px;
}

.links a {
  display: inline-block;
  padding: 12px;
  border-radius: 18px;
  background: rgba(255, 255, 255, 0.08);
  backdrop-filter: blur(10px);
  transition: 0.3s;
}

.links a:hover {
  transform: scale(1.1);
  background: rgba(255, 255, 255, 0.15);
}

.links img {
  width: 65px;
}

.music-player {
  margin-top: 20px;
  background: rgba(20, 20, 35, 0.92);
  border-radius: 12px;
  padding: 16px;
}

iframe {
  width: 100%;
  height: 152px;
  border-radius: 8px;
}

.wolf {
  position: fixed;
  width: 38px;
  height: 38px;
  pointer-events: none;
  transform: translate(-50%, -50%);
  animation: pop 0.15s ease-out;
  z-index: 9999;
}

@keyframes pop {
  from { transform: translate(-50%, -50%) scale(0.2); }
  to { transform: translate(-50%, -50%) scale(1); }
}
</style>
</head>

<body>
  <div class="container">
    <h1>About Me</h1>

    <!-- 👇 BIRTHDAY ADDED HERE -->
    <div class="birthday">Birthday: 2/21/2012</div>

    <div id="typed-text"></div>

    <div class="links">
      <a href="https://www.roblox.com/users/3442848028/profile" target="_blank">
        <img src="https://upload.wikimedia.org/wikipedia/commons/7/7e/Roblox_Logo_2022.jpg" />
      </a>

      <a href="https://discord.com/users/jvh_o" target="_blank">
        <img src="https://cdn-icons-png.flaticon.com/512/5968/5968756.png" />
      </a>
    </div>

    <div class="neon">Songs I Like</div>

    <div class="music-player">
      <iframe
        src="https://open.spotify.com/embed/track/7KA4W4McWYRpgf0fWsJZWB?utm_source=generator"
        allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"></iframe>
    </div>
  </div>

  <script>
    const text = `I love dogs and cars. My favorite colors are blue, red, black, green and more.
I play Roblox, Brawl Stars, Clash Royale and more.
Big fan of Flamingo and iShowSpeed 🔥`;

    let i = 0;
    function type() {
      if (i < text.length) {
        document.getElementById("typed-text").innerHTML += text[i++];
        setTimeout(type, 50);
      }
    }
    type();

    document.addEventListener("mousemove", (e) => {
      const img = document.createElement("img");
      img.src = "https://minecraft.wiki/images/thumb/Wolf_JE2_BE2.png/120px-Wolf_JE2_BE2.png";
      img.className = "wolf";
      img.style.left = e.clientX + "px";
      img.style.top = e.clientY + "px";
      document.body.appendChild(img);

      let y = e.clientY;
      let velocity = 0;

      function fall() {
        velocity += 0.6;
        y += velocity;
        img.style.top = y + "px";

        if (y > window.innerHeight + 120) {
          img.remove();
          return;
        }

        requestAnimationFrame(fall);
      }

      fall();
    });
  </script>
</body>
</html>
