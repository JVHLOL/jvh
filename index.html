<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>My Profile</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet" />

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Share Tech Mono', monospace;

  /* Removed custom cursor */
  /* cursor: url("https://cdn.custom-cursor.com/packs/2122/pack2747.png"), auto; */
}

body {
  height: 100vh;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  position: relative;
}

/* background */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: url("https://media1.giphy.com/media/v1.Y2lkPTc5MGI3NjExMTB3cTBnYWR1NGN2cjd6ODduZThjNmI2a3VxMW50dnZhbGhiN3o4YyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/tZKET59fOmmDzzHMjY/giphy.gif")
    center/cover no-repeat;
  filter: brightness(0.35);
  z-index: -3;
}

/* rainbow border */
body::after {
  content: "";
  position: fixed;
  inset: 0;
  padding: 6px;
  pointer-events: none;

  background: linear-gradient(
    45deg,
    rgba(255, 0, 0, 0.5),
    rgba(255, 165, 0, 0.5),
    rgba(255, 255, 0, 0.5),
    rgba(0, 255, 0, 0.5),
    rgba(0, 255, 255, 0.5),
    rgba(0, 0, 255, 0.5),
    rgba(238, 130, 238, 0.5),
    rgba(255, 0, 0, 0.5)
  );

  background-size: 300% 300%;
  animation: rainbow 8s linear infinite;

  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
}

@keyframes rainbow {
  0% {
    background-position: 0% 50%;
  }
  100% {
    background-position: 300% 50%;
  }
}

/* container */
.container {
  max-width: 900px;
  padding: 30px;
  border-radius: 20px;
  text-align: center;
  background: rgba(255, 255, 255, 0.08);
  backdrop-filter: blur(12px);
  z-index: 2;
  position: relative;
}

h1 {
  font-size: 3rem;
}

#typed-text {
  font-size: 1.1rem;
  min-height: 150px;
  white-space: pre-line;
}

.neon {
  font-size: 1.7rem;
  margin-top: 20px;
  color: #fff;
  text-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 20px #fff;
}

/* links */
.links {
  margin-top: 20px;
  display: flex;
  justify-content: center;
  gap: 40px;
}

.links a {
  display: inline-block;
  padding: 12px;
  border-radius: 18px;
  background: rgba(255, 255, 255, 0.08);
  backdrop-filter: blur(10px);
  transition: 0.3s;
}

.links a:hover {
  transform: scale(1.1);
  background: rgba(255, 255, 255, 0.15);
}

.links img {
  width: 65px;
}

/* music */
.music-player {
  margin-top: 20px;
  background: rgba(20, 20, 35, 0.92);
  border-radius: 12px;
  padding: 16px;
}

iframe {
  width: 100%;
  height: 152px;
  border-radius: 8px;
}
</style>
</head>

<body>
  <div class="container">
    <h1>About Me</h1>

    <div id="typed-text"></div>

    <div class="links">
      <a href="https://www.roblox.com/users/3442848028/profile" target="_blank" rel="noopener noreferrer">
        <img src="https://upload.wikimedia.org/wikipedia/commons/7/7e/Roblox_Logo_2022.jpg" alt="Roblox Logo" />
      </a>

      <a href="https://discord.com/users/jvh_o" target="_blank" rel="noopener noreferrer">
        <img src="https://cdn-icons-png.flaticon.com/512/5968/5968756.png" alt="Discord Icon" />
      </a>
    </div>

    <div class="neon">Songs I Like</div>

    <div class="music-player">
      <iframe
        src="https://open.spotify.com/embed/track/7KA4W4McWYRpgf0fWsJZWB?utm_source=generator"
        allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
        title="Spotify music player"
      ></iframe>
    </div>
  </div>

  <script>
    const text = `I love dogs and cars. My favorite colors are blue, red, black, green and more.
I play Roblox, Brawl Stars, Clash Royale and more.
Big fan of Flamingo and iShowSpeed 🔥`;

    let i = 0;
    function type() {
      if (i < text.length) {
        document.getElementById("typed-text").innerHTML += text[i++];
        setTimeout(type, 50); // slowed from 15ms to 50ms
      }
    }
    type();

    // Removed wolf trail mouse follower functionality
  </script>
</body>
</html>
